AWSTemplateFormatVersion: "2010-09-09"
Description: "Yinshi bring-your-own-cloud runner on AWS EC2 with outbound-only networking."

Parameters:
  YinshiControlUrl:
    Type: String
    Description: "Base URL of the Yinshi control plane, for example https://yinshi.example.com."
  RegistrationToken:
    Type: String
    NoEcho: true
    Description: "One-time runner registration token generated in Yinshi settings."
  RunnerStorageProfile:
    Type: String
    Default: aws_ebs_s3_files
    AllowedValues:
      - aws_ebs_s3_files
      - archil_shared_files
      - archil_all_posix
    Description: "Storage profile from docs/deployment/runner-storage-options.md. AWS BYOC is supported; Archil profiles are experimental."
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC where the runner instance should run."
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: "Private or public subnet with outbound internet/NAT access."
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedPattern: "^[a-z0-9.]+$"
    Description: "EC2 instance type for the runner."
  RootVolumeGiB:
    Type: Number
    Default: 80
    MinValue: 40
    MaxValue: 2048
    Description: "Encrypted EBS root volume size. Required for runner token state and for SQLite in aws_ebs_s3_files or archil_shared_files."
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: "Amazon Linux 2023 AMI SSM parameter."
  PackageInstallCommand:
    Type: String
    Default: "/opt/yinshi-runner/venv/bin/python -m pip install --upgrade 'git+https://github.com/codyborders/yinshi.git#subdirectory=backend'"
    Description: "Command that installs the yinshi Python package into the runner virtualenv."
  SharedFilesMountCommand:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional profile-specific shell command that mounts S3 Files, Archil, NFS, or another POSIX filesystem at the profile shared path. Keep secrets in AWS Secrets Manager, SSM Parameter Store, or your own bootstrap code; do not paste long-lived secrets into this template."

Resources:
  RunnerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Application
          Value: YinshiRunner

  RunnerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref RunnerRole

  RunnerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Yinshi runner outbound-only security group."
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Application
          Value: YinshiRunner

  RunnerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref RunnerInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref RunnerSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            VolumeSize: !Ref RootVolumeGiB
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: yinshi-runner
        - Key: Application
          Value: YinshiRunner
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          RUNNER_STORAGE_PROFILE="${RunnerStorageProfile}"
          RUNNER_DATA_DIR="/var/lib/yinshi"
          case "$RUNNER_STORAGE_PROFILE" in
            aws_ebs_s3_files)
              RUNNER_SQLITE_DIR="/var/lib/yinshi/sqlite"
              RUNNER_SHARED_FILES_DIR="/mnt/yinshi-s3-files"
              RUNNER_SQLITE_STORAGE="runner_ebs"
              RUNNER_SHARED_FILES_STORAGE="s3_files_or_local_posix"
              ;;
            archil_shared_files)
              RUNNER_SQLITE_DIR="/var/lib/yinshi/sqlite"
              RUNNER_SHARED_FILES_DIR="/mnt/archil/yinshi"
              RUNNER_SQLITE_STORAGE="runner_ebs"
              RUNNER_SHARED_FILES_STORAGE="archil"
              ;;
            archil_all_posix)
              RUNNER_SQLITE_DIR="/mnt/archil/yinshi/sqlite"
              RUNNER_SHARED_FILES_DIR="/mnt/archil/yinshi"
              RUNNER_SQLITE_STORAGE="archil"
              RUNNER_SHARED_FILES_STORAGE="archil"
              ;;
            *)
              echo "Unsupported RunnerStorageProfile: $RUNNER_STORAGE_PROFILE" >&2
              exit 1
              ;;
          esac

          dnf update -y
          dnf install -y git podman python3 python3-pip nfs-utils

          mkdir -p "$RUNNER_DATA_DIR" "$RUNNER_SQLITE_DIR" "$RUNNER_SHARED_FILES_DIR" /opt/yinshi-runner
          chmod 700 "$RUNNER_DATA_DIR"
          chmod 700 "$RUNNER_SQLITE_DIR"
          chmod 755 "$RUNNER_SHARED_FILES_DIR"

          cat >/tmp/yinshi-shared-files-mount.sh <<'MOUNT'
          ${SharedFilesMountCommand}
          MOUNT
          if grep -q '[^[:space:]]' /tmp/yinshi-shared-files-mount.sh; then
            bash /tmp/yinshi-shared-files-mount.sh
          fi
          mkdir -p "$RUNNER_SQLITE_DIR"
          mkdir -p \
            "$RUNNER_SHARED_FILES_DIR/repos" \
            "$RUNNER_SHARED_FILES_DIR/worktrees" \
            "$RUNNER_SHARED_FILES_DIR/pi-config" \
            "$RUNNER_SHARED_FILES_DIR/sessions" \
            "$RUNNER_SHARED_FILES_DIR/artifacts" \
            "$RUNNER_SHARED_FILES_DIR/db-backups"

          python3 -m venv /opt/yinshi-runner/venv
          /opt/yinshi-runner/venv/bin/python -m pip install --upgrade pip wheel
          ${PackageInstallCommand}

          cat >/etc/yinshi-runner.env <<ENV
          YINSHI_CONTROL_URL=${YinshiControlUrl}
          YINSHI_REGISTRATION_TOKEN=${RegistrationToken}
          YINSHI_RUNNER_STORAGE_PROFILE=$RUNNER_STORAGE_PROFILE
          YINSHI_RUNNER_SQLITE_STORAGE=$RUNNER_SQLITE_STORAGE
          YINSHI_RUNNER_SHARED_FILES_STORAGE=$RUNNER_SHARED_FILES_STORAGE
          YINSHI_RUNNER_DATA_DIR=$RUNNER_DATA_DIR
          YINSHI_RUNNER_SQLITE_DIR=$RUNNER_SQLITE_DIR
          YINSHI_RUNNER_SHARED_FILES_DIR=$RUNNER_SHARED_FILES_DIR
          YINSHI_RUNNER_TOKEN_FILE=/var/lib/yinshi/runner-token
          YINSHI_RUNNER_ENV_FILE=/etc/yinshi-runner.env
          ENV
          chmod 600 /etc/yinshi-runner.env

          cat >/etc/systemd/system/yinshi-runner.service <<'SERVICE'
          [Unit]
          Description=Yinshi cloud runner
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          EnvironmentFile=/etc/yinshi-runner.env
          ExecStart=/opt/yinshi-runner/venv/bin/python -m yinshi.runner_agent
          Restart=always
          RestartSec=10
          User=root
          WorkingDirectory=/var/lib/yinshi

          [Install]
          WantedBy=multi-user.target
          SERVICE

          systemctl daemon-reload
          systemctl enable --now yinshi-runner.service

Outputs:
  RunnerInstanceId:
    Description: "EC2 instance ID for the Yinshi runner."
    Value: !Ref RunnerInstance
  RunnerSecurityGroupId:
    Description: "Outbound-only security group assigned to the runner."
    Value: !Ref RunnerSecurityGroup
  RunnerStorageProfile:
    Description: "Storage profile configured for the runner."
    Value: !Ref RunnerStorageProfile
